general {
    lock_cmd = qs -c noctalia-shell ipc call lockScreen lock
}

listener {
    timeout = 300 # 5min.
    on-timeout = save-current-brightness && ddcutil --bus 0 setvcp 10 10 
		on-resume = ddcutil --bus 0 setvcp 10 $(cat /tmp/brightness)
}

listener {
    timeout = 600 # 10min.
		on-timeout = qs -c noctalia-shell ipc call lockScreen lock
}

listener {
    timeout = 900 # 15min.
    on-timeout = hyprctl dispatch dpms off
		on-resume = hyprctl dispatch dpms on
}
